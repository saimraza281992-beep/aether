<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Authenticating...</title>
  <style>
    body {
      background-color: #05050a;
      color: #d4af37;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>
  <p>Weaving your connection... this window will close automatically.</p>
  <script>
    if (window.opener) {
      // Send the URL hash (which contains the Supabase access token) back to the main window
      window.opener.postMessage({ 
        type: 'OAUTH_AUTH_SUCCESS', 
        hash: window.location.hash 
      }, '*');
      window.close();
    } else {
      window.location.href = '/';
    }
  </script>
</body>
</html>
